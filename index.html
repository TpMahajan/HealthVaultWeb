<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/app_icon.png?v=2" />
    <link rel="shortcut icon" href="/app_icon.png?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="description" content="Medical Vault - Secure platform for managing patient health records" />
    <link rel="apple-touch-icon" href="/app_icon.png?v=2" />
    <link rel="manifest" href="/manifest.json" />
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
      if (window.location.hostname === "127.0.0.1" || window.location.hostname === "0.0.0.0") {
        const canonicalUrl = `http://localhost:${window.location.port}${window.location.pathname}${window.location.search}${window.location.hash}`;
        window.location.replace(canonicalUrl);
      }
    </script>
    <script>
      const injectedGoogleClientId = "%VITE_GOOGLE_CLIENT_ID%";
      const looksUnreplacedViteToken =
        injectedGoogleClientId.startsWith("%VITE_") &&
        injectedGoogleClientId.endsWith("%");
      window.__GOOGLE_CLIENT_ID__ =
        injectedGoogleClientId && !looksUnreplacedViteToken
          ? injectedGoogleClientId
          : "";
    </script>
    <title>Medical Vault</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
