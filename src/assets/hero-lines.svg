<svg viewBox="0 0 1440 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.2" />
      <stop offset="50%" stop-color="#14B8A6" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.1" />
    </linearGradient>
  </defs>

  <!-- Flowing clean curves -->
  <path d="M-100,500 C300,600 700,400 1500,100" fill="none" stroke="url(#lineGrad)" stroke-width="1.5" />
  <path d="M-100,650 C400,700 800,300 1500,-50" fill="none" stroke="url(#lineGrad)" stroke-width="0.8" opacity="0.6" />
  <path d="M-100,750 C450,800 900,450 1500,150" fill="none" stroke="url(#lineGrad)" stroke-width="2" opacity="0.3" filter="url(#glow)"/>
  <path d="M-100,850 C600,600 1000,550 1500,350" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.2" />

  <!-- Abstract floating nodes -->
  <g fill="#0EA5E9">
    <circle cx="150" cy="530" r="3" opacity="0.4"/>
    <circle cx="350" cy="580" r="4" opacity="0.7" filter="url(#glow)"/>
    <circle cx="550" cy="480" r="5" opacity="0.3"/>
    <circle cx="750" cy="400" r="3" opacity="0.5"/>
    <circle cx="850" cy="350" r="6" opacity="0.2"/>
    <circle cx="1050" cy="230" r="4" opacity="0.6" filter="url(#glow)"/>
    <circle cx="1250" cy="180" r="5" opacity="0.4"/>
    <circle cx="1400" cy="120" r="3" opacity="0.5"/>
    
    <circle cx="200" cy="670" r="2" opacity="0.3"/>
    <circle cx="450" cy="660" r="4" opacity="0.5"/>
    <circle cx="650" cy="450" r="3" opacity="0.8"/>
    <circle cx="950" cy="300" r="5" opacity="0.3"/>
    <circle cx="1150" cy="150" r="4" opacity="0.4"/>
  </g>
  
  <!-- Subtle glowing connection lines -->
  <g stroke="#06B6D4" stroke-width="0.5" opacity="0.2">
    <line x1="350" y1="580" x2="450" y2="660" />
    <line x1="550" y1="480" x2="650" y2="450" />
    <line x1="750" y1="400" x2="950" y2="300" />
    <line x1="1050" y1="230" x2="1150" y2="150" />
  </g>
</svg>
